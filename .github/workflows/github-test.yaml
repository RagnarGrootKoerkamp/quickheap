# .github/workflows/test.yaml

# Name of the job in GitHub UI.
name: Test

# When to trigger?
on:
  # Run on pushes to master branch
  push:
    branches: ["master"]
  # Run on PRs to the master branch
  pull_request:
    branches: ["master"]
  # Allow manual triggering via GitHub UI
  workflow_dispatch:

# Cargo commands should show nice colours.
env:
  CARGO_TERM_COLOR: always

jobs:
  # Arbitrary name for this step.
  test:
    # TODO: Run on both x86-64 ubuntu and aarch64 macos.
    strategy:
      matrix:
        # os: [ubuntu-latest, macos-latest]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # First check out the repository.
      - uses: actions/checkout@v6
      # Caching build artefacts may speed up large builds.
      - uses: Swatinem/rust-cache@v2
      # Run all tests in debug and release mode.
      - run: cargo test --package quickheap
      - run: cargo test --package quickheap -r
      # Build the shared library and compile/run the C++ example against it.
      - run: cargo build --package quickheap --release --features c
      - run: g++ -std=c++17 -I cpp cpp/example.cpp -L target/release -lquickheap -o quickheap_example
      - run: LD_LIBRARY_PATH=target/release ./quickheap_example
