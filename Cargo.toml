[workspace]
members = ["s3q-sys"]

[package]
name = "quickheap"
version = "0.0.1"
edition = "2024"
license = "MIT"
repository = "https://github.com/ragnargrootkoerkamp/quickheap"
keywords = ["priority-queue", "heap", "simd"]
categories = ["algorithms", "data-structures"]
authors = ["Ragnar Groot Koerkamp"]
description = "A SIMD-accelerated priority queue"

[profile.release]
debug = true

[dependencies]
csv = "1"
serde = { version = "1", features = ["derive"] }
dary_heap = "0.3.7"
fastrand = "2.3.0"
fibonacci_heap = "0.7.5"
indexset = "0.12.3"
itertools = "0.14.0"
orx-priority-queue = "1.7.0"
perfcnt = "0.8.0"
pheap = "0.3.0"
radix-heap = "0.4.2"
rand = "0.9.2"
random = "0.14.0"
weakheap = "0.1.0"
wide = "0.7.33"
s3q-sys = { path = "s3q-sys" }

