language = "C"
cpp_compat = true
include_guard = "QUICKHEAP_H"
header = """
/* Generated by cbindgen from src/c.rs. Do not edit by hand.
 * Regenerate with: cbindgen --config cbindgen.toml --output cpp/quickheap.h
 *
 * This is a low-level C-ABI header. For idiomatic C++, prefer
 * `cpp/quickheap.hpp`, which wraps these functions in a small RAII class.
 */"""

[parse.expand]
crates = ["quickheap"]
features = ["c"]

[export]
exclude = []
